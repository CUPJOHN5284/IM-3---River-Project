<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rolling Down the River - Final Table Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/@sgratzl/chartjs-chart-boxplot@3.10.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .main-layout { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
        .farmhouse-area { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; background: #edead0; border: 2px dashed #8d8d8d; border-radius: 8px; width: 80px; align-self: stretch; }
        .farm-icon { font-size: 40px; }
        .farm-label { writing-mode: vertical-rl; text-orientation: upright; font-weight: bold; color: #5d4037; font-size: 0.8em; }
        .grid-container { display: flex; gap: 10px; align-items: stretch; }
        .river { background: #3498db; color: white; writing-mode: vertical-rl; padding: 10px; border-radius: 5px; font-weight: bold; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(10, 42px); gap: 2px; background: #ccc; border: 2px solid #333; }
        .plot { width: 42px; height: 42px; background: white; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 2px; transition: 0.2s; }
        .selected { background: #f1c40f !important; border: 2px solid #e67e22; box-sizing: border-box; font-weight: bold; color: black !important; }
        .controls { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 320px; }
        button { width: 100%; padding: 8px; margin: 4px 0; cursor: pointer; font-weight: bold; border: 1px solid #ddd; border-radius: 4px; }
        .btn-run { background: #2ecc71; color: white; border: none; }
        .stats-container { width: 100%; max-width: 1000px; margin-top: 20px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background: #f8f9fa; }
        canvas { max-height: 280px; }
    </style>
</head>
<body>

    <h2>Rolling Down the River: Sampling Simulator</h2>

    <div class="main-layout">
        <div class="farmhouse-area">
            <div class="farm-icon">🏡</div>
            <div class="farm-label">FARMHOUSE</div>
        </div>

        <div class="grid-container">
            <div id="corn-grid" class="grid"></div>
            <div class="river">RIVER</div>
        </div>

        <div class="controls">
            <h3>Sampling Methods</h3>
            <button class="btn-run" onclick="sample('Convenience')">A. Convenience Sample</button>
            <button class="btn-run" onclick="sample('SRS')">B. Simple Random Sample</button>
            <button class="btn-run" onclick="sample('Systematic')">C. Systematic Sample</button>
            <button class="btn-run" onclick="sample('Vertical')">D. Vertical Strata</button>
            <button class="btn-run" onclick="sample('Horizontal')">E. Horizontal Strata</button>
            <button class="btn-run" onclick="sample('Cluster')">F. Cluster Sample</button>
            <button style="background:#e74c3c; color:white; margin-top:10px;" onclick="resetSim()">Reset All Data</button>
        </div>
    </div>

    <div class="stats-container">
        <h3>5-Number Summary & Comparison Stats</h3>
        <table>
            <thead>
                <tr>
                    <th>Sampling Method</th>
                    <th>Count</th>
                    <th>Min</th>
                    <th>Q1</th>
                    <th>Median</th>
                    <th>Q3</th>
                    <th>Max</th>
                    <th style="color: #e74c3c;">IQR</th>
                    <th style="background:#fef9e7; font-weight:bold;">Running Mean</th>
                </tr>
            </thead>
            <tbody id="stats-body"></tbody>
        </table>
        <canvas id="yieldChart" style="margin-top:20px;"></canvas>
    </div>

    <script>
        // Data derived from Page 7 yield grid [cite: 65, 68-124]
        const yieldData = [
            [6, 17, 20, 38, 47, 55, 69, 76, 82, 97], [7, 14, 23, 34, 43, 56, 63, 75, 81, 92],
            [2, 14, 28, 30, 50, 50, 62, 80, 85, 96], [9, 15, 27, 34, 43, 51, 65, 72, 88, 91],
            [4, 15, 28, 32, 44, 50, 64, 76, 82, 97], [5, 16, 27, 31, 48, 59, 69, 72, 86, 99],
            [5, 18, 28, 34, 50, 60, 62, 75, 90, 90], [8, 15, 20, 38, 40, 54, 62, 77, 88, 93],
            [7, 17, 29, 39, 44, 53, 61, 77, 80, 90], [7, 19, 22, 33, 49, 53, 67, 76, 86, 97]
        ];

        const actualAvg = 50.04;
        const methods = ['Convenience', 'SRS', 'Systematic', 'Vertical', 'Horizontal', 'Cluster'];
        let history = { Convenience: [], SRS: [], Systematic: [], Vertical: [], Horizontal: [], Cluster: [] };
        let revealGrid = false;
        let showMeanLine = false;
        let chart;

        function createGrid() {
            const grid = document.getElementById('corn-grid');
            grid.innerHTML = '';
            for (let r = 0; r < 10; r++) {
                for (let c = 0; c < 10; c++) {
                    const div = document.createElement('div');
                    div.className = 'plot';
                    div.id = `plot-${r}-${c}`;
                    div.innerText = revealGrid ? yieldData[r][c] : "?";
                    div.style.color = revealGrid ? "#333" : "#ccc";
                    grid.appendChild(div);
                }
            }
        }

        function calculateStats(data) {
            if (data.length === 0) return Array(8).fill("-");
            const sorted = [...data].sort((a, b) => a - b);
            const sum = data.reduce((a, b) => a + b, 0);
            const mean = sum / data.length;
            const median = getMedian(sorted);
            const q1 = getMedian(sorted.slice(0, Math.floor(sorted.length / 2)));
            const q3 = getMedian(sorted.slice(Math.ceil(sorted.length / 2)));
            return [
                sorted[0].toFixed(1),      // Min
                q1.toFixed(1),             // Q1
                median.toFixed(1),         // Median
                q3.toFixed(1),             // Q3
                sorted[sorted.length-1].toFixed(1), // Max
                (q3 - q1).toFixed(2),      // IQR
                mean.toFixed(2)            // Mean (at the end)
            ];
        }

        function getMedian(arr) {
            const mid = Math.floor(arr.length / 2);
            return arr.length % 2 !== 0 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2;
        }

        function sample(type) {
            let selected = [];
            if (type === 'Convenience') {
                for(let r=0; r<10; r++) selected.push({r, c:0}); // Plots closest to farmhouse [cite: 14-15]
            } else if (type === 'SRS') {
                while(selected.length < 10) {
                    let r = Math.floor(Math.random()*10), c = Math.floor(Math.random()*10);
                    if(!selected.some(p => p.r === r && p.c === c)) selected.push({r, c});
                }
            } else if (type === 'Systematic') {
                let start = Math.floor(Math.random()*10);
                for(let i=0; i<10; i++) {
                    let idx = (start + i*10) % 100;
                    selected.push({r: Math.floor(idx/10), c: idx%10});
                }
            } else if (type === 'Vertical') {
                for(let c=0; c<10; c++) selected.push({r: Math.floor(Math.random()*10), c});
            } else if (type === 'Horizontal') {
                for(let r=0; r<10; r++) selected.push({r, c: Math.floor(Math.random()*10)});
            } else if (type === 'Cluster') {
                const clusterId = Math.floor(Math.random() * 10);
                const startRow = (clusterId % 5) * 2;
                const startCol = Math.floor(clusterId / 5) * 5;
                for(let r = startRow; r < startRow + 2; r++) {
                    for(let c = startCol; c < startCol + 5; c++) {
                        selected.push({r, c});
                    }
                }
            }

            const mean = selected.reduce((s, p) => s + yieldData[p.r][p.c], 0) / 10;
            history[type].push(mean);
            
            createGrid(); 
            selected.forEach(p => {
                const el = document.getElementById(`plot-${p.r}-${p.c}`);
                el.classList.add('selected');
                el.innerText = yieldData[p.r][p.c];
            });

            updateUI();
        }

        function updateUI() {
            const body = document.getElementById('stats-body');
            body.innerHTML = '';
            methods.forEach(m => {
                const stats = calculateStats(history[m]);
                body.innerHTML += `<tr><td>${m}</td><td>${history[m].length}</td>
                    <td>${stats[0]}</td><td>${stats[1]}</td><td>${stats[2]}</td>
                    <td>${stats[3]}</td><td>${stats[4]}</td>
                    <td style="font-weight:bold; color:#e74c3c;">${stats[5]}</td>
                    <td style="background:#fef9e7; font-weight:bold;">${stats[6]}</td></tr>`;
            });
            updateChart();
        }

        function updateChart() {
            chart.data.datasets[0].data = methods.map(m => history[m]);
            chart.options.plugins.annotation.annotations = showMeanLine ? {
                line1: { type: 'line', yMin: actualAvg, yMax: actualAvg, borderColor: 'red', borderWidth: 3, borderDash: [6, 6],
                         label: { display: true, content: `Actual μ: ${actualAvg}`, backgroundColor: 'red' } }
            } : {};
            chart.update();
        }

        function initChart() {
            const ctx = document.getElementById('yieldChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'boxplot',
                data: { labels: methods, datasets: [{ label: 'Sample Means', backgroundColor: 'rgba(52, 152, 219, 0.4)', borderColor: '#3498db', borderWidth: 1, data: [[],[],[],[],[],[]] }] },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 100 } } }
            });
        }

        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 'u') { e.preventDefault(); revealGrid = !revealGrid; createGrid(); }
            if (e.altKey && e.key.toLowerCase() === 'a') { e.preventDefault(); showMeanLine = !showMeanLine; updateChart(); }
        });

        function resetSim() { history = { Convenience:[], SRS:[], Systematic:[], Vertical:[], Horizontal:[], Cluster:[] }; updateUI(); }

        createGrid(); initChart(); updateUI();
    </script>
</body>
</html>
